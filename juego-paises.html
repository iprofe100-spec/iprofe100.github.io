<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liceo Avanzar · Juego de Países</title>
<style>
  :root{
    --bg1:#EAF4FB; --bg2:#FDF6EC;
    --ink:#142E47; --soft:#4A647C;
    --brand:#1C6DD0; --brand-dark:#13539e;
    --coral:#FF6B5E; --sun:#FFC23C;
    --green:#28A766; --green-d:#1f8a53;
    --red:#E64539;
    --card:#FFFFFF; --line:#D8E3EE;
    --gold:#FFC23C; --silver:#C4CFDA; --bronze:#E09556;
    --r:26px;
    --font:"Arial","Helvetica Neue",Helvetica,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font);
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    padding:20px;
    display:flex;justify-content:center;
  }
  .app{width:100%;max-width:840px;margin:auto 0}

  /* ---------- pantallas ---------- */
  .screen{display:none;animation:fade .35s ease}
  .screen.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ---------- inicio ---------- */
  .hero{text-align:center;margin:8px 0 26px}
  .logo{
    display:block;width:100%;max-width:360px;height:auto;margin:0 auto 6px;
    background:#fff;border-radius:18px;padding:14px 18px;
    box-shadow:0 6px 0 var(--line);
  }
  .kicker{
    display:inline-block;background:var(--sun);color:#5A3E00;
    font-weight:bold;letter-spacing:.12em;font-size:15px;
    padding:7px 16px;border-radius:999px;text-transform:uppercase;
    box-shadow:0 4px 0 #E5A400;
  }
  h1{font-size:46px;line-height:1.05;margin:16px 0 8px;letter-spacing:.01em}
  .sub{color:var(--soft);font-size:19px;font-weight:bold}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:8px}
  .card{
    background:var(--card);border:3px solid var(--line);
    border-radius:var(--r);padding:22px 14px 18px;text-align:center;
    cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;
    box-shadow:0 8px 0 var(--line);
  }
  .card:hover,.card:focus-visible{
    transform:translateY(-4px);border-color:var(--brand);
    box-shadow:0 12px 0 var(--brand);outline:none;
  }
  .card:active{transform:translateY(2px);box-shadow:0 4px 0 var(--brand)}
  .card .flag{display:flex;justify-content:center;align-items:center;min-height:66px}
  .card .cname{
    margin-top:12px;font-size:21px;font-weight:bold;
    text-transform:uppercase;letter-spacing:.04em;
  }

  /* ---------- banderas ---------- */
  .flagimg,.fsvg{display:block;border-radius:8px;box-shadow:0 0 0 1px rgba(0,0,0,.12)}
  .card .flag .flagimg,.card .flag .fsvg{width:100px;height:auto}
  #gFlag .flagimg,#gFlag .fsvg{width:52px;height:auto}
  .pod .pflag .flagimg,.pod .pflag .fsvg{width:48px;height:auto;margin:0 auto}

  .rank-btn{
    margin:26px auto 0;display:flex;align-items:center;gap:12px;
    background:var(--ink);color:#fff;border:none;cursor:pointer;
    font-family:var(--font);font-weight:bold;font-size:20px;
    text-transform:uppercase;letter-spacing:.06em;
    padding:18px 28px;border-radius:18px;box-shadow:0 6px 0 #0a1a2b;
    transition:transform .1s;
  }
  .rank-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #0a1a2b}
  .rank-btn .em{font-size:26px}

  /* ---------- juego ---------- */
  .topbar{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .back{
    background:#fff;border:3px solid var(--line);border-radius:16px;
    width:58px;height:58px;font-size:26px;cursor:pointer;flex:0 0 auto;
    box-shadow:0 5px 0 var(--line);transition:transform .1s;
  }
  .back:active{transform:translateY(3px);box-shadow:0 2px 0 var(--line)}
  .gflag{display:inline-flex;align-items:center}
  .gname{font-size:24px;font-weight:bold;text-transform:uppercase;letter-spacing:.04em}

  .progress{margin-bottom:16px}
  .progress .label{font-weight:bold;color:var(--soft);font-size:16px;
    text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
  .dots{display:flex;gap:7px}
  .dot{flex:1;height:12px;border-radius:6px;background:var(--line)}
  .dot.done{background:var(--green)}
  .dot.now{background:var(--brand)}

  .qcard{
    background:var(--card);border:3px solid var(--line);
    border-radius:var(--r);padding:24px;box-shadow:0 10px 0 var(--line);
  }
  .qhead{display:flex;align-items:center;gap:18px;margin-bottom:18px}
  .picto{
    width:104px;height:104px;flex:0 0 auto;border-radius:22px;
    background:linear-gradient(160deg,#EFF6FF,#FFF4E2);
    border:3px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-size:60px;overflow:hidden;
  }
  .picto img{width:88%;height:88%;object-fit:contain}
  .qtext{
    flex:1;font-size:29px;font-weight:bold;line-height:1.2;
    text-transform:uppercase;letter-spacing:.01em;
  }
  .speak{
    margin:4px 0 20px;display:flex;align-items:center;gap:12px;
    background:var(--brand);color:#fff;border:none;cursor:pointer;
    font-family:var(--font);font-weight:bold;font-size:19px;
    text-transform:uppercase;letter-spacing:.05em;
    padding:15px 24px;border-radius:16px;box-shadow:0 5px 0 var(--brand-dark);
    transition:transform .1s;
  }
  .speak:active{transform:translateY(3px);box-shadow:0 2px 0 var(--brand-dark)}
  .speak .em{font-size:24px}

  .options{display:grid;gap:14px}
  .options.duo{grid-template-columns:1fr 1fr}
  .opt{
    position:relative;background:#fff;border:3px solid var(--line);
    border-radius:18px;padding:22px 20px;cursor:pointer;
    font-family:var(--font);font-weight:bold;font-size:23px;color:var(--ink);
    text-transform:uppercase;letter-spacing:.02em;text-align:center;
    box-shadow:0 6px 0 var(--line);transition:transform .1s,border-color .1s,box-shadow .1s;
  }
  .opt:hover:not(.locked),.opt:focus-visible:not(.locked){
    border-color:var(--brand);box-shadow:0 6px 0 var(--brand);outline:none;
  }
  .opt:active:not(.locked){transform:translateY(3px);box-shadow:0 2px 0 var(--brand)}
  .opt.locked{cursor:default}
  .opt.good{border-color:var(--green);background:#EAFBF1;box-shadow:0 6px 0 var(--green-d);color:var(--green-d)}
  .opt.bad{border-color:var(--red);background:#FDECEA;box-shadow:0 6px 0 #b8362c;color:#b8362c}
  .opt .stamp{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:30px
  }

  .next{
    margin-top:20px;width:100%;background:var(--coral);color:#fff;border:none;cursor:pointer;
    font-family:var(--font);font-weight:bold;font-size:24px;
    text-transform:uppercase;letter-spacing:.06em;
    padding:22px;border-radius:18px;box-shadow:0 7px 0 #d24b40;transition:transform .1s;
  }
  .next:active{transform:translateY(3px);box-shadow:0 3px 0 #d24b40}
  .next[hidden]{display:none}

  /* ---------- final ---------- */
  .final{text-align:center;background:var(--card);border:3px solid var(--line);
    border-radius:var(--r);padding:34px 26px;box-shadow:0 10px 0 var(--line)}
  .final .big{font-size:24px;font-weight:bold;text-transform:uppercase;
    letter-spacing:.08em;color:var(--soft)}
  .scorebox{font-size:74px;font-weight:bold;color:var(--brand);margin:6px 0 2px;line-height:1}
  .scorebox small{font-size:30px;color:var(--soft)}
  .stars{font-size:40px;margin:8px 0 4px}
  .msg{font-size:24px;font-weight:bold;text-transform:uppercase;margin:10px 0 24px;letter-spacing:.02em}
  .namebox{margin:0 auto;max-width:440px;text-align:left}
  .namebox label{display:block;font-weight:bold;text-transform:uppercase;
    letter-spacing:.06em;color:var(--soft);font-size:17px;margin-bottom:10px}
  .namebox input{
    width:100%;font-family:var(--font);font-size:26px;font-weight:bold;
    text-transform:uppercase;letter-spacing:.05em;text-align:center;
    padding:18px;border:3px solid var(--line);border-radius:16px;color:var(--ink);
  }
  .namebox input:focus{outline:none;border-color:var(--brand)}
  .save{
    margin-top:16px;width:100%;background:var(--green);color:#fff;border:none;cursor:pointer;
    font-family:var(--font);font-weight:bold;font-size:23px;
    text-transform:uppercase;letter-spacing:.06em;
    padding:20px;border-radius:16px;box-shadow:0 6px 0 var(--green-d);transition:transform .1s;
  }
  .save:active{transform:translateY(3px);box-shadow:0 3px 0 var(--green-d)}
  .save:disabled{opacity:.5;cursor:default}
  .retry{
    margin-top:14px;background:none;border:none;cursor:pointer;color:var(--brand);
    font-family:var(--font);font-weight:bold;font-size:18px;text-decoration:underline;
    text-transform:uppercase;letter-spacing:.04em;
  }

  /* ---------- ranking ---------- */
  .rank-wrap{background:var(--card);border:3px solid var(--line);
    border-radius:var(--r);padding:30px 24px 34px;box-shadow:0 10px 0 var(--line);text-align:center}
  .rank-wrap h2{font-size:34px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
  .rank-wrap .note{color:var(--soft);font-weight:bold;font-size:16px;margin-bottom:24px}
  .podium{display:flex;justify-content:center;align-items:flex-end;gap:14px;margin-bottom:8px}
  .pod{flex:1;max-width:200px}
  .pod .who{font-weight:bold;text-transform:uppercase;font-size:19px;margin-bottom:8px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pod .pts{font-weight:bold;font-size:18px;color:var(--soft)}
  .pod .pflag{display:flex;justify-content:center;margin-bottom:6px}
  .bar{border-radius:16px 16px 0 0;display:flex;align-items:flex-start;justify-content:center;
    padding-top:14px;color:#fff;font-size:40px;font-weight:bold}
  .bar.b1{background:var(--gold);height:150px;box-shadow:0 6px 0 #d99f1f}
  .bar.b2{background:var(--silver);height:112px;box-shadow:0 6px 0 #9fadbb}
  .bar.b3{background:var(--bronze);height:88px;box-shadow:0 6px 0 #bb7740}
  .empty{color:var(--soft);font-weight:bold;font-size:20px;text-transform:uppercase;
    padding:30px 10px;letter-spacing:.03em}
  .home-btn{
    margin-top:26px;background:var(--brand);color:#fff;border:none;cursor:pointer;
    font-family:var(--font);font-weight:bold;font-size:20px;
    text-transform:uppercase;letter-spacing:.06em;
    padding:18px 30px;border-radius:16px;box-shadow:0 6px 0 var(--brand-dark);transition:transform .1s;
  }
  .home-btn:active{transform:translateY(3px);box-shadow:0 3px 0 var(--brand-dark)}

  @media(max-width:560px){
    body{padding:14px}
    h1{font-size:36px}
    .grid{grid-template-columns:repeat(2,1fr);gap:14px}
    .card .flag{font-size:54px}
    .qhead{flex-direction:column;text-align:center}
    .qtext{font-size:25px}
    .picto{width:92px;height:92px;font-size:52px}
    .options.duo{grid-template-columns:1fr}
    .scorebox{font-size:60px}
  }
  @media(prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>

/* =================== BANDERAS =================== */

// Banderas dibujadas: respaldo si no hay internet (nunca se ven las letras "ZA", "BR"...)

function flagHTML(key){
  const iso = ISO[key];
  return `<img class="flagimg" src="https://flagcdn.com/w320/${iso}.png" alt="${COUNTRIES[key].name}" onerror="flagFallback(this,'${key}')">`;
}
function flagFallback(img, key){ img.outerHTML = FLAGS_SVG[key] || ''; }

/* =================== ESTADO =================== */
let state = {key:null, list:[], idx:0, score:0, answered:false};
let memRanking = []; // respaldo si el guardado compartido no está disponible
const pictoCache = {};

/* =================== INICIO =================== */
function buildGrid(){
  const g = document.getElementById('grid');
  g.innerHTML = '';
  Object.keys(COUNTRIES).forEach(key=>{
    const c = COUNTRIES[key];
    const card = document.createElement('button');
    card.className = 'card';
    card.innerHTML = `<span class="flag">${flagHTML(key)}</span><span class="cname">${c.name}</span>`;
    card.onclick = ()=>startGame(key);
    g.appendChild(card);
  });
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
}
function goHome(){ stopSpeak(); show('inicio'); }

/* =================== JUEGO =================== */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startGame(key){
  const c = COUNTRIES[key];
  state = {key, list:shuffle(c.q), idx:0, score:0, answered:false};
  document.getElementById('gFlag').innerHTML = flagHTML(key);
  document.getElementById('gName').textContent = c.name.toUpperCase();
  buildDots();
  show('juego');
  renderQuestion();
}

function buildDots(){
  const d = document.getElementById('dots');
  d.innerHTML = '';
  for(let i=0;i<state.list.length;i++){
    const s = document.createElement('div');
    s.className = 'dot';
    d.appendChild(s);
  }
}
function paintDots(){
  const dots = document.querySelectorAll('#dots .dot');
  dots.forEach((el,i)=>{
    el.className = 'dot' + (i<state.idx?' done':(i===state.idx?' now':''));
  });
}

function renderQuestion(){
  state.answered = false;
  stopSpeak();
  const q = state.list[state.idx];
  document.getElementById('pLabel').textContent = `PREGUNTA ${state.idx+1} DE ${state.list.length}`;
  paintDots();
  document.getElementById('qText').textContent = q.t;

  // pictograma: emoji al instante, ARASAAC encima si la red lo permite
  const picto = document.getElementById('picto');
  picto.textContent = q.e;
  loadPicto(q.p).then(url=>{
    if(url && state.list[state.idx]===q){
      const img = new Image();
      img.alt = q.p;
      img.onload = ()=>{ if(state.list[state.idx]===q){ picto.innerHTML=''; picto.appendChild(img);} };
      img.src = url;
    }
  });

  // opciones (orden aleatorio)
  const box = document.getElementById('options');
  box.innerHTML = '';
  const isDuo = q.o.length === 2;
  box.className = 'options' + (isDuo?' duo':'');
  const correctText = q.o[q.c];
  const opts = shuffle(q.o);
  opts.forEach(text=>{
    const b = document.createElement('button');
    b.className = 'opt';
    b.textContent = text;
    b.onclick = ()=>choose(b, text===correctText);
    box.appendChild(b);
  });
  document.getElementById('nextBtn').hidden = true;
}

function choose(btn, isCorrect){
  if(state.answered) return;
  state.answered = true;
  const all = document.querySelectorAll('#options .opt');
  const q = state.list[state.idx];
  const correctText = q.o[q.c];
  all.forEach(el=>{
    el.classList.add('locked');
    if(el.textContent === correctText){
      el.classList.add('good');
      el.insertAdjacentHTML('beforeend','<span class="stamp">✅</span>');
    }
  });
  if(isCorrect){
    state.score++;
  }else{
    btn.classList.remove('good');
    btn.classList.add('bad');
    btn.insertAdjacentHTML('beforeend','<span class="stamp">❌</span>');
  }
  speak(isCorrect ? "¡Muy bien!" : "Casi. La respuesta correcta es " + correctText);
  document.getElementById('nextBtn').hidden = false;
}

function nextQuestion(){
  if(state.idx < state.list.length-1){
    state.idx++;
    renderQuestion();
  }else{
    endGame();
  }
}

/* =================== AUDIO =================== */
function stopSpeak(){ if('speechSynthesis' in window) window.speechSynthesis.cancel(); }
function speak(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-ES'; u.rate = 0.9;
  window.speechSynthesis.speak(u);
}
function speakQuestion(){
  const q = state.list[state.idx];
  const opciones = q.o.join('. ');
  speak(q.t + '. ' + opciones);
}

/* =================== PICTOGRAMAS ARASAAC =================== */
async function loadPicto(keyword){
  if(keyword in pictoCache) return pictoCache[keyword];
  try{
    const ctrl = new AbortController();
    const tid = setTimeout(()=>ctrl.abort(), 4000);
    const res = await fetch('https://api.arasaac.org/api/pictograms/es/bestsearch/'+encodeURIComponent(keyword), {signal:ctrl.signal});
    clearTimeout(tid);
    if(!res.ok) throw 0;
    const data = await res.json();
    if(Array.isArray(data) && data.length){
      const id = data[0]._id;
      const url = 'https://static.arasaac.org/pictograms/'+id+'/'+id+'_300.png';
      pictoCache[keyword] = url;
      return url;
    }
  }catch(e){ /* sin conexión o bloqueado: se queda el emoji */ }
  pictoCache[keyword] = null;
  return null;
}

/* =================== FINAL =================== */
function endGame(){
  stopSpeak();
  const s = state.score;
  document.getElementById('fScore').textContent = s;
  let stars, msg;
  if(s>=9){ stars='⭐⭐⭐'; msg='¡EXCELENTE!'; }
  else if(s>=6){ stars='⭐⭐'; msg='¡MUY BIEN!'; }
  else if(s>=3){ stars='⭐'; msg='¡BIEN! SEGUÍ ASÍ'; }
  else{ stars='💪'; msg='¡A SEGUIR APRENDIENDO!'; }
  document.getElementById('fStars').textContent = stars;
  document.getElementById('fMsg').textContent = msg;
  const inp = document.getElementById('nameInput');
  inp.value = '';
  document.getElementById('saveBtn').disabled = true;
  document.getElementById('saveBtn').textContent = 'GUARDAR EN EL RANKING';
  show('final');
  speak(`Terminaste con ${s} de 10. ${msg}`);
  setTimeout(()=>inp.focus(),300);
}
function checkName(){
  const v = document.getElementById('nameInput').value.trim();
  document.getElementById('saveBtn').disabled = v.length===0;
}

/* =================== RANKING (compartido) =================== */
async function getRanking(){
  try{
    const r = await window.storage.get('ranking', true);
    return r && r.value ? JSON.parse(r.value) : [];
  }catch(e){ return memRanking; }
}
async function putRanking(list){
  try{
    await window.storage.set('ranking', JSON.stringify(list), true);
  }catch(e){ memRanking = list; }
}

async function saveScore(){
  const name = document.getElementById('nameInput').value.trim().toUpperCase().slice(0,14);
  if(!name) return;
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'GUARDANDO...';
  const list = await getRanking();
  list.push({name, score:state.score, country:state.key});
  list.sort((a,b)=> b.score-a.score);
  await putRanking(list.slice(0,20));
  showRanking();
}

async function showRanking(){
  stopSpeak();
  const list = await getRanking();
  const top = list.slice(0,3);
  const pod = document.getElementById('podium');
  if(top.length===0){
    pod.innerHTML = '<div class="empty">TODAVÍA NO HAY PUNTAJES.<br>¡SÉ EL PRIMERO EN JUGAR!</div>';
  }else{
    const order = [1,0,2]; // plata, oro, bronce -> visual de podio
    const medals = ['🥇','🥈','🥉'];
    const bars = ['b1','b2','b3'];
    let html = '<div class="podium">';
    order.forEach(rank=>{
      if(!top[rank]) return;
      const p = top[rank];
      html += `<div class="pod">
        <div class="pflag">${p.country?flagHTML(p.country):(p.flag||'')}</div>
        <div class="who">${escapeHtml(p.name)}</div>
        <div class="pts">${p.score}/10</div>
        <div class="bar ${bars[rank]}">${medals[rank]}</div>
      </div>`;
    });
    html += '</div>';
    pod.innerHTML = html;
  }
  show('ranking');
}

function escapeHtml(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

/* =================== ARRANQUE =================== */
buildGrid();
// "calentar" voces de síntesis (algunos navegadores las cargan tarde)
if('speechSynthesis' in window){ window.speechSynthesis.getVoices(); }
</script>
